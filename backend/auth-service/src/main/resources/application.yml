server:
  port: 8001

spring:
  application:
    name: auth-service
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_job?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  # Cloud Eureka配置
  cloud:
    eureka:
      client:
        service-url:
          defaultZone: http://localhost:8761/eureka/

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campusjob.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: campus-job-secret-key-2024-please-change-in-production
  expiration: 604800  # 7天，单位：秒

# 日志配置
logging:
  level:
    root: INFO
    com.campusjob: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
